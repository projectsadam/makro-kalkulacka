<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Správa potravin | Makro kalkulačka</title>

    <meta name="description" content="Správa vlastního katalogu potravin." />

    <link rel="stylesheet" href="styles.css?v=1" />
  </head>

  <body>
    <div id="foodsApplication" hidden>
      <header class="topbar">
        <div>
          <p class="eyebrow">Makro kalkulačka</p>
          <h1>Správa potravin</h1>
        </div>

        <div class="topbar-actions">
          <a href="index.html" class="button secondary"> Zpět na jídelníčky </a>

          <button id="logoutButton" class="button secondary" type="button">
            Odhlásit se
          </button>
        </div>
      </header>

      <main class="foods-page">
        <section class="card catalog-editor">
          <div>
            <p class="eyebrow">Katalog</p>
            <h2 id="catalogFoodFormTitle">Přidat potravinu</h2>
          </div>

          <form id="catalogFoodForm" class="catalog-food-form">
            <div class="field">
              <label for="catalogFoodName"> Název </label>

              <input id="catalogFoodName" type="text" required />
            </div>

            <div class="field">
              <label for="catalogFoodCategory"> Kategorie </label>

              <input
                id="catalogFoodCategory"
                type="text"
                placeholder="Např. Maso a ryby"
              />
            </div>

            <div class="catalog-macro-fields">
              <div class="field">
                <label for="catalogFoodProtein"> Bílkoviny na 100 g </label>

                <input
                  id="catalogFoodProtein"
                  type="number"
                  min="0"
                  step="0.1"
                  required
                />
              </div>

              <div class="field">
                <label for="catalogFoodFat"> Tuky na 100 g </label>

                <input
                  id="catalogFoodFat"
                  type="number"
                  min="0"
                  step="0.1"
                  required
                />
              </div>

              <div class="field">
                <label for="catalogFoodCarbs"> Sacharidy na 100 g </label>

                <input
                  id="catalogFoodCarbs"
                  type="number"
                  min="0"
                  step="0.1"
                  required
                />
              </div>
            </div>

            <div class="dialog-actions">
              <button
                id="cancelFoodEditButton"
                class="button secondary"
                type="button"
                hidden
              >
                Zrušit úpravu
              </button>

              <button
                id="saveCatalogFoodButton"
                class="button primary"
                type="submit"
              >
                Přidat potravinu
              </button>
            </div>
          </form>
        </section>

        <section class="card catalog-overview">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Uložené položky</p>
              <h2>Potraviny</h2>
            </div>

            <span id="catalogFoodCount" class="catalog-count"> 0 </span>
          </div>

          <div id="catalogFoodList" class="catalog-food-list"></div>

          <p id="emptyCatalogFoods" class="empty-state">
            Zatím nemáte uloženou žádnou potravinu.
          </p>
        </section>
      </main>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="foods.js?v=1"></script>
  </body>
</html>
